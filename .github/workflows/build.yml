name: Build Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller --name="文件重复校验工具-${{ github.ref_name }}" `
          --windowed `
          --onefile `
          --add-data "core;core" `
          --add-data "gui_modules;gui_modules" `
          --hidden-import=PIL `
          --hidden-import=imagehash `
          --hidden-import=cv2 `
          --hidden-import=numpy `
          run_gui.py
          
    - name: Create release package
      run: |
        mkdir release
        copy "dist\文件重复校验工具-${{ github.ref_name }}.exe" "release\"
        copy "README.md" "release\"
        copy "QUICK_START.md" "release\"
        mkdir "release\docs"
        copy "docs\*.md" "release\docs\"
        Compress-Archive -Path release\* -DestinationPath "文件重复校验工具-${{ github.ref_name }}-windows.zip"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: 文件重复校验工具-${{ github.ref_name }}-windows.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: 文件重复校验工具-${{ github.ref_name }}-windows.zip
        body_path: docs/RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller --name="文件重复校验工具-${{ github.ref_name }}" \
          --windowed \
          --onefile \
          --add-data "core:core" \
          --add-data "gui_modules:gui_modules" \
          --hidden-import=PIL \
          --hidden-import=imagehash \
          --hidden-import=cv2 \
          --hidden-import=numpy \
          run_gui.py
          
    - name: Create release package
      run: |
        mkdir release
        cp "dist/文件重复校验工具-${{ github.ref_name }}" "release/"
        cp "README.md" "release/"
        cp "QUICK_START.md" "release/"
        mkdir -p "release/docs"
        cp "docs"/*.md "release/docs/"
        cd release && zip -r "../文件重复校验工具-${{ github.ref_name }}-linux.zip" .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-executable
        path: 文件重复校验工具-${{ github.ref_name }}-linux.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: 文件重复校验工具-${{ github.ref_name }}-linux.zip
        body_path: docs/RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller --name="文件重复校验工具-${{ github.ref_name }}" \
          --windowed \
          --onefile \
          --add-data "core:core" \
          --add-data "gui_modules:gui_modules" \
          --hidden-import=PIL \
          --hidden-import=imagehash \
          --hidden-import=cv2 \
          --hidden-import=numpy \
          run_gui.py
          
    - name: Create release package
      run: |
        mkdir release
        cp "dist/文件重复校验工具-${{ github.ref_name }}" "release/"
        cp "README.md" "release/"
        cp "QUICK_START.md" "release/"
        mkdir -p "release/docs"
        cp "docs"/*.md "release/docs/"
        cd release && zip -r "../文件重复校验工具-${{ github.ref_name }}-macos.zip" .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-executable
        path: 文件重复校验工具-${{ github.ref_name }}-macos.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: 文件重复校验工具-${{ github.ref_name }}-macos.zip
        body_path: docs/RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

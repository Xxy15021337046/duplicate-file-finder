name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        type: boolean
        default: false

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verify imports
      run: |
        python -c "import PIL; print('Pillow OK')"
        python -c "import imagehash; print('imagehash OK')"
        python -c "import cv2; print('OpenCV OK')"
        python -c "import pefile; print('pefile OK')"
        python -c "import packaging; print('packaging OK')"

    - name: Build executable
      run: |
        pyinstaller --name="文件重复校验工具" `
                    --windowed `
                    --onefile `
                    --icon=NONE `
                    --add-data "core;core" `
                    --add-data "gui_modules;gui_modules" `
                    --hidden-import=PIL `
                    --hidden-import=imagehash `
                    --hidden-import=cv2 `
                    --hidden-import=numpy `
                    --hidden-import=pefile `
                    --hidden-import=packaging `
                    run_gui.py

    - name: Test executable
      run: |
        if (Test-Path "dist\文件重复校验工具.exe") {
          Write-Host "Executable found!"
          Get-Item "dist\文件重复校验工具.exe" | Select-Object Name, Length
        } else {
          Write-Error "Executable not found!"
          exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: duplicate-file-finder-windows
        path: dist/*.exe
        retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: duplicate-file-finder-windows
        path: artifacts/windows

    - name: Generate checksums
      run: |
        cd artifacts/windows
        sha256sum *.exe > SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/windows/*.exe
          artifacts/windows/SHA256SUMS.txt
        draft: false
        prerelease: false
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
